name: Deploy Meridian Finance

on:
  push:
    branches: [main]
    paths:
      - 'meridian-finance/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: meridian-finance/package-lock.json

      - run: npm ci
        working-directory: meridian-finance

      - run: npm run build
        working-directory: meridian-finance

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: meridian-finance/dist

      - uses: actions/deploy-pages@v4
        id: deployment
