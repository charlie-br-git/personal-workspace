name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'personal-site/**'
      - 'meridian-finance/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            personal-site/package-lock.json
            meridian-finance/package-lock.json

      # Build personal site
      - run: npm ci
        working-directory: personal-site

      - run: npm run build
        working-directory: personal-site

      # Build Meridian Finance
      - run: npm ci
        working-directory: meridian-finance

      - run: npm run build
        working-directory: meridian-finance

      # Merge: place meridian dist inside personal site output
      - run: cp -r meridian-finance/dist personal-site/out/meridian-finance

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: personal-site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
